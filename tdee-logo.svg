<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&amp;display=swap');
    </style>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f9eff"/>
      <stop offset="100%" stop-color="#ff5dac"/>
    </linearGradient>
    <clipPath id="text-clip">
      <text
        x="200" y="200"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif"
        font-weight="800"
        font-size="174"
        letter-spacing="-2">TDEE</text>
    </clipPath>
  </defs>

  <rect width="400" height="400" rx="72" fill="#000000"/>
  <rect width="400" height="400" fill="url(#grad)" clip-path="url(#text-clip)"/>
</svg>
